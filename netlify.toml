# Netlify 배포 설정 — UI 설정보다 이 파일이 우선한다.
# base=app 이므로 publish/command 는 app 디렉터리 기준(상대경로)이다.
[build]
  base = "app"
  command = "npm run build"
  publish = "dist"          # → app/dist (base 기준 상대경로). 'app/dist'로 쓰면 app/app/dist 를 찾아 404.

[build.environment]
  NODE_VERSION = "20"

# SPA — 어떤 경로로 진입/새로고침해도 index.html 로 (클라이언트 라우팅 보호)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
# ===== 캐시 정책 =====
# 모바일 등에서 옛 배포(옛 데이터)가 캐시로 남아 PC와 값이 달라 보이던 문제 방지.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
