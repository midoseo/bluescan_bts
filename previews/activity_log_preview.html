<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>영업활동관리 샘플</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{--accent:#1d6ceb;--ink:#191f28;--sub:#6b7684;--line:#eaecf0;--bg:#f4f6f8;
 --visit:#1d6ceb;--report:#0f9d63;--msg:#8b5cf6;--red:#e5502b;--amber:#e2971e;}
*{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 500,'opsz' 24;vertical-align:middle;line-height:1;}
.wrap{max-width:960px;margin:0 auto;padding:24px 18px 60px;}
h1{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px;} .desc{font-size:14px;color:var(--sub);margin:0 0 16px;}
/* KPI */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 15px;cursor:pointer;transition:.12s;}
.kpi:hover{border-color:#b9cdf3;} .kpi.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,108,235,.15);}
.kpi__n{font-size:22px;font-weight:800;line-height:1;} .kpi__n i{font-size:13px;color:var(--sub);font-weight:700;font-style:normal;margin-left:2px;}
.kpi__lab{font-size:13px;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:6px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;} .d-visit{background:var(--visit);} .d-report{background:var(--report);} .d-msg{background:var(--msg);} .d-all{background:#98a2b3;}
.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.chips{display:flex;gap:8px;flex-wrap:wrap;} .chip{border:1px solid #d3daea;background:#fff;color:#3a4048;border-radius:999px;padding:7px 15px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;} .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.dl{border:1px solid #d3daea;background:#fff;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;color:#3a4048;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
/* 타임라인 */
.feed{display:flex;flex-direction:column;}
.daygrp{margin-top:6px;} .dayhead{font-size:13px;font-weight:700;color:#8b95a1;margin:14px 2px 8px;}
.item{display:flex;gap:13px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:9px;}
.item__ico{width:40px;height:40px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff;}
.i-visit .item__ico{background:var(--visit);} .i-report .item__ico{background:var(--report);} .i-msg .item__ico{background:var(--msg);}
.item__body{flex:1;min-width:0;}
.item__top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;}
.item__type{font-size:12px;font-weight:800;padding:2px 9px;border-radius:999px;}
.i-visit .item__type{background:#eaf2ff;color:#1d55c4;} .i-report .item__type{background:#e6f6ee;color:#0b7a4b;} .i-msg .item__type{background:#f1eaff;color:#6b3fd4;}
.item__name{font-size:16px;font-weight:700;} .track{font-size:11px;font-weight:700;color:#8b95a1;background:#f2f4f6;border-radius:6px;padding:2px 7px;}
.st{font-size:12px;font-weight:800;border-radius:6px;padding:2px 8px;} .st-won{background:#e7f0ff;color:#1d55c4;} .st-done{background:#e6f6ee;color:#0b7a4b;} .st-revisit{background:#fff4d9;color:#9a6b00;} .st-reject{background:#ffe9e2;color:#c0341a;}
.item__desc{font-size:14px;color:#4b5563;line-height:1.5;} .item__meta{font-size:13px;color:#9aa4b0;margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;}
.item__time{font-size:13px;color:#9aa4b0;flex:none;white-space:nowrap;}
.empty{background:#fff;border:1px dashed #d3daea;border-radius:14px;padding:40px;text-align:center;color:#9aa4b0;}
@media(max-width:640px){.kpis{grid-template-columns:1fr 1fr;}}
</style></head><body><div class="wrap">
<h1>영업활동관리</h1>
<p class="desc">신규 영업 방문 결과, 유지고객 월간 리포트·감성터칭 문자 발송 내역이 시간순으로 쌓여요.</p>

<div class="kpis" id="kpis"></div>
<div class="bar">
 <div class="chips" id="chips"></div>
 <button class="dl"><span class="material-symbols-rounded" style="font-size:18px">download</span>CSV 다운로드</button>
</div>
<div class="feed" id="feed"></div>
</div>
<script>
// 샘플 활동 로그 (방문 결과 / 리포트 발송 / 문자 발송)
var LOG=[
 {type:'visit',track:'A 신규',name:'서울여자중학교 본관',date:'2026-07-08',time:'14:20',status:'won',stLab:'수주완료',desc:'전산실 보유 확인. 블루스캔 듀얼 계약 체결 — 월 32만원 개시 예정. 경비원 2명 원격 전환 제안 수용.'},
 {type:'msg',track:'유지',name:'원이앤에스',date:'2026-07-08',time:'11:05',desc:'감성터칭 문자 발송 — "장마철 지하 집수정 점검 안내드립니다. 최근 누수 신호 관련 안심 케어 중이에요."'},
 {type:'report',track:'유지',name:'신한은행 (이대지점)',date:'2026-07-08',time:'09:40',desc:'2026년 6월 월간 유지관리 리포트 발송 — 신호 12건(경미 10·주의 2), 원격제어 0회, 계약 D-822.'},
 {type:'visit',track:'B 기존(업셀)',name:'이화여자대학교 ECC관',date:'2026-07-07',time:'16:10',status:'revisit',stLab:'재방문필요',desc:'담당자 부재. 전산실 관제 니즈 확인 — 다음주 시설팀장 미팅 재예약.'},
 {type:'report',track:'유지',name:'국민은행 신촌지점',date:'2026-07-07',time:'15:22',desc:'2026년 6월 월간 유지관리 리포트 발송 — 특이 신호 없음, 안정 운영.'},
 {type:'visit',track:'A 신규',name:'추계예술대학교',date:'2026-07-07',time:'10:30',status:'done',stLab:'방문완료',desc:'노후 건축물·지하 기계실 보유. 침수 관제 제안서 전달, 검토 후 회신 예정.'},
 {type:'msg',track:'유지',name:'듀델코리아',date:'2026-07-06',time:'17:45',desc:'감성터칭 문자 발송 — 신규 개시 축하 및 앱 사용법 안내.'},
 {type:'visit',track:'B 기존(업셀)',name:'경성중고',date:'2026-07-06',time:'13:15',status:'reject',stLab:'거절',desc:'현 알람 계약 만족, 원격 전환 보류. 사유 기록 — 예산 이슈. 6개월 후 재접촉 알림 설정.'},
 {type:'report',track:'유지',name:'인앤인주택관리 (공덕한화)',date:'2026-07-06',time:'09:10',desc:'2026년 6월 월간 유지관리 리포트 발송 — 집수정 고수위 신호 3건, 배수펌프 점검 권고 포함.'},
 {type:'visit',track:'A 신규',name:'농협생명보험 지하1층',date:'2026-07-05',time:'11:50',status:'done',stLab:'방문완료',desc:'전산실 관제 관심. 견적 요청 접수.'},
 {type:'msg',track:'유지',name:'홍콩상하이은행',date:'2026-07-05',time:'10:20',desc:'감성터칭 문자 발송 — 정기 안부 및 여름철 설비 점검 안내.'},
 {type:'visit',track:'B 기존(업셀)',name:'백상건설 회장실',date:'2026-07-05',time:'09:30',status:'won',stLab:'수주완료',desc:'중요실(전산실) 블루스캔 도입 확정 — 월 18만원. 계약서 발송 완료.'},
];
var TYPE={visit:['방문 결과','fact_check','i-visit','d-visit'],report:['리포트 발송','description','i-report','d-report'],msg:['문자 발송','sms','i-msg','d-msg']};
var filt='all';
function counts(){var c={all:LOG.length,visit:0,report:0,msg:0};LOG.forEach(function(l){c[l.type]++;});return c;}
var C=counts();
var KPI=[['all','전체 활동','d-all'],['visit','방문 결과','d-visit'],['report','리포트 발송','d-report'],['msg','문자 발송','d-msg']];
document.getElementById('kpis').innerHTML=KPI.map(function(k){return '<div class="kpi'+(filt===k[0]?' on':'')+'" data-f="'+k[0]+'" onclick="setF(\''+k[0]+'\')"><div class="kpi__n">'+C[k[0]]+'<i>건</i></div><div class="kpi__lab"><span class="dot '+k[2]+'"></span>'+k[1]+'</div></div>';}).join('');
var CH=[['all','전체'],['visit','방문 결과'],['report','리포트 발송'],['msg','문자 발송']];
document.getElementById('chips').innerHTML=CH.map(function(c){return '<button class="chip'+(filt===c[0]?' on':'')+'" data-f="'+c[0]+'" onclick="setF(\''+c[0]+'\')">'+c[1]+'</button>';}).join('');
function setF(f){filt=f;document.querySelectorAll('.kpi').forEach(function(b){b.classList.toggle('on',b.dataset.f===f);});document.querySelectorAll('.chip').forEach(function(b){b.classList.toggle('on',b.dataset.f===f);});render();}
function render(){
 var rows=LOG.filter(function(l){return filt==='all'||l.type===filt;});
 if(!rows.length){document.getElementById('feed').innerHTML='<div class="empty">해당 유형의 활동이 없어요.</div>';return;}
 var html='';var lastDay='';
 rows.forEach(function(l){
  if(l.date!==lastDay){lastDay=l.date;html+='<div class="dayhead">'+l.date+'</div>';}
  var t=TYPE[l.type];
  var st=l.status?'<span class="st st-'+l.status+'">'+l.stLab+'</span>':'';
  html+='<div class="item '+t[2]+'"><div class="item__ico"><span class="material-symbols-rounded">'+t[1]+'</span></div>'
   +'<div class="item__body"><div class="item__top"><span class="item__type">'+t[0]+'</span><span class="item__name">'+l.name+'</span><span class="track">'+l.track+'</span>'+st+'</div>'
   +'<div class="item__desc">'+l.desc+'</div></div>'
   +'<div class="item__time">'+l.time+'</div></div>';
 });
 document.getElementById('feed').innerHTML=html;
}
render();
</script></body></html>
