  function swap(){
    document.querySelectorAll(".login2__brand").forEach(function(b){
      if(b.getAttribute("data-bts-swapped"))return;
      b.setAttribute("data-bts-swapped","1");
      b.innerHTML="";
      b.style.display="flex"; b.style.alignItems="center";
      var img=document.createElement("img");
      img.src=LOCKUP; img.alt="에스원 BTS";
      img.style.height="34px"; img.style.width="auto"; img.style.display="block";
      b.appendChild(img);
    });
    document.querySelectorAll('img[alt="블루스캔 타깃"]').forEach(function(im){
      if(im.getAttribute("data-bts-swapped"))return;
      im.setAttribute("data-bts-swapped","1");
      im.src=LOCKUP; im.style.width="auto";
      var p=im.parentElement;
      for(var i=0;i<3&&p;i++){
        var ci=p.querySelector('img[alt="에스원"]');
        if(ci){ var ciw=ci.closest(".login2__ci")||ci; ciw.style.display="none"; break; }
        p=p.parentElement;
      }
    });
  }
  swap();
  document.addEventListener("DOMContentLoaded",swap);
  var mo=new MutationObserver(function(){swap();});
  function obs(){ if(document.body) mo.observe(document.body,{childList:true,subtree:true}); }
  if(document.body) obs(); else document.addEventListener("DOMContentLoaded",obs);
})();</script>

<body style="background-color: rgb(229, 229, 229)">
  <div id="root"></div>

  <!-- ===== BTS login loading panel · A (Orbit) ===== -->
  <div id="bts-boot-loader" role="status" aria-label="블루스캔 BTS 타깃 스캔 중">
    <div class="btsbl-brand">
      <span class="s1">에스원</span>
      <span class="bar"></span>
      <span class="lockup">
        <svg width="19" height="21" viewBox="0 0 24 26" aria-hidden="true"><path d="M12 1 L23 7 V19 L12 25 L1 19 V7 Z" fill="none" stroke="#1d6ceb" stroke-width="2" stroke-linejoin="round"></path></svg>
        <span class="wm">BTS</span>
      </span>
    </div>
    <div class="btsbl-stage">
      <div class="btsbl-glow"></div>

      <!-- orbiting circular text -->
      <svg class="btsbl-orbit" viewBox="0 0 240 240" width="290" height="290" aria-hidden="true">
        <defs>
          <path id="btsbl-textpath" d="M120,120 m-100,0 a100,100 0 1,1 200,0 a100,100 0 1,1 -200,0"></path>
        </defs>
        <text font-size="11.5" letter-spacing="5.5" fill="#1d6ceb" font-weight="600"
              font-family="'SamsungOne Korean','Pretendard Variable',Pretendard,system-ui,sans-serif">
          <textPath href="#btsbl-textpath" startOffset="0">BLUESCAN&#160;TOTAL&#160;AI&#160;SYSTEM&#160;&#160;·&#160;&#160;BLUESCAN&#160;TOTAL&#160;AI&#160;SYSTEM&#160;&#160;·&#160;&#160;</textPath>
        </text>
      </svg>

      <!-- rotating accent arc -->
      <svg class="btsbl-arc" viewBox="0 0 240 240" width="290" height="290" aria-hidden="true">
        <defs>
          <linearGradient id="btsbl-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#2b9eff"></stop>
            <stop offset="1" stop-color="#1d6ceb"></stop>
          </linearGradient>
        </defs>
        <circle cx="120" cy="120" r="78" fill="none" stroke="#e2f1ff" stroke-width="3"></circle>
        <circle cx="120" cy="120" r="78" fill="none" stroke="url(#btsbl-grad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="115 375"></circle>
      </svg>

      <!-- center hexagon logo -->
      <div class="btsbl-core">
        <div class="btsbl-hex"><span>BTS</span></div>
      </div>
    </div>

    <div class="btsbl-caption"><span>타깃 스캔 중</span><span class="btsbl-dots"><i></i><i></i><i></i></span></div>
  </div>

  <style>
    #bts-boot-loader{
      position:fixed;display:none;z-index:2147483000;pointer-events:none;
      flex-direction:column;align-items:center;justify-content:center;gap:38px;overflow:hidden;
      background:radial-gradient(circle at 50% 42%,#ffffff 0%,#eef3fc 60%,#e6eefb 100%);
      font-family:"SamsungOne Korean","Pretendard Variable",Pretendard,system-ui,sans-serif;
    }
    .btsbl-stage{position:relative;width:290px;height:290px;}
    .btsbl-orbit,.btsbl-arc{position:absolute;inset:0;width:100%;height:100%;transform-origin:50% 50%;}
    .btsbl-orbit{animation:btsbl-rot 19s linear infinite;}
    .btsbl-arc{animation:btsbl-rot 1.7s linear infinite;}
    .btsbl-glow,.btsbl-core{position:absolute;top:50%;left:50%;}
    .btsbl-glow{
      width:172px;height:172px;margin:-86px 0 0 -86px;border-radius:50%;
      background:radial-gradient(circle,rgba(43,158,255,.40),rgba(43,158,255,0) 70%);
      animation:btsbl-glow 2.6s ease-in-out infinite;
    }
    .btsbl-core{margin:-44px 0 0 -44px;}
    .btsbl-hex{
      width:88px;height:88px;
      clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
      background:linear-gradient(150deg,#2b9eff 0%,#1d6ceb 52%,#2453cc 100%);
      display:grid;place-items:center;box-shadow:0 12px 30px rgba(29,108,235,.38);
    }
    .btsbl-hex span{color:#fff;font-size:27px;font-weight:800;letter-spacing:1.5px;text-shadow:0 1px 2px rgba(0,0,0,.18);}
    .btsbl-brand{position:absolute;top:34px;left:40px;display:flex;align-items:center;gap:13px;white-space:nowrap;}
    .btsbl-brand .s1{font-size:18px;font-weight:700;color:#353535;letter-spacing:-.01em;}
    .btsbl-brand .bar{width:1px;height:18px;background:rgba(53,53,53,.25);}
    .btsbl-brand .lockup{display:flex;align-items:center;gap:8px;}
    .btsbl-brand .wm{font-size:18px;font-weight:800;color:#1d6ceb;letter-spacing:.5px;}
    .btsbl-caption{
      display:flex;align-items:center;gap:8px;white-space:nowrap;
      font-size:15px;font-weight:600;letter-spacing:.06em;color:#2453cc;
    }
    .btsbl-dots{display:inline-flex;gap:4px;}
    .btsbl-dots i{width:5px;height:5px;border-radius:50%;background:#1d6ceb;animation:btsbl-dot 1.4s ease-in-out infinite;}
    .btsbl-dots i:nth-child(2){animation-delay:.2s;}
    .btsbl-dots i:nth-child(3){animation-delay:.4s;}
    @keyframes btsbl-rot{to{transform:rotate(360deg);}}
    @keyframes btsbl-glow{0%,100%{opacity:.5;transform:scale(.9);}50%{opacity:.85;transform:scale(1.08);}}
    @keyframes btsbl-dot{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
    @media (prefers-reduced-motion:reduce){
      .btsbl-orbit{animation-duration:40s;}
      .btsbl-arc,.btsbl-glow,.btsbl-dots i{animation:none;}
    }
  </style>
  <script>/*__BTS_LOGIN_LEFT__*/(function(){
    var el=document.getElementById("bts-boot-loader");
    if(!el) return;
    function place(){
      var left=document.querySelector("#root .login2__left");
      if(!left){ el.style.display="none"; return; }
      var r=left.getBoundingClientRect();
      if(r.width<10||r.height<10){ el.style.display="none"; return; }
      el.style.display="flex";
      el.style.top=r.top+"px";
      el.style.left=r.left+"px";
      el.style.width=r.width+"px";
      el.style.height=r.height+"px";
    }
    place();
    if(document.body){
      var mo=new MutationObserver(place);
      mo.observe(document.body,{childList:true,subtree:true});
    }
    window.addEventListener("resize",place);
    setInterval(place,400);
  })();</script>
